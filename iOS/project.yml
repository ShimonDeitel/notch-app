name: Notch
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  Notch:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Notch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.woodcutlog
        INFOPLIST_FILE: Notch/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Notch - Woodcut Log"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    info:
      path: Notch/Info.plist
      properties:
        CFBundleDisplayName: "Notch - Woodcut Log"
        ITSAppUsesNonExemptEncryption: false
  NotchTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NotchTests
    dependencies:
      - target: Notch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.woodcutlog.tests
  NotchUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NotchUITests
    dependencies:
      - target: Notch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.woodcutlog.uitests
schemes:
  Notch:
    build:
      targets:
        Notch: all
    test:
      targets:
        - NotchTests
        - NotchUITests
    run:
      config: Debug
